{# news_fragment.html - News ticker fragment for AJAX refresh #}
<div class="news-fragment">
    
    <div class="news-ticker" style="display: flex; justify-content: center; align-items: center; min-height: 80px;">
        <div class="news-content" style="text-align: center; width: 100%;">
            {% if news_items and news_items|length > 0 %}
                <div id="news-title" class="news-title">{{ news_items[0].title }}</div>
                <div id="news-summary" class="news-summary">{{ news_items[0].summary }}</div>
            {% else %}
                <div id="news-title" class="news-title">No news available.</div>
                <div id="news-summary" class="news-summary"></div>
            {% endif %}
            <script>
                window.newsEvents = {{ news_items|tojson|safe }};
            </script>
        </div>
    </div>

        <style>
            .news-title {
                font-size: 1.6rem;
                font-weight: 700;
                color: #FFD700;
                margin-top: 0.35rem;
            }

            .news-summary {
                font-size: 1.2rem;
                color: #ddd;
                margin-top: 0.3rem;
            }
        </style>
</div>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" width="100" height="150">
  <!-- Wheels -->
  <circle cx="28" cy="144" r="8" fill="#222" stroke="#000" stroke-width="1"/>
  <circle cx="72" cy="144" r="8" fill="#222" stroke="#000" stroke-width="1"/>
  <!-- Axle bar -->
  <rect x="28" y="138" width="44" height="4" rx="2" fill="#333"/>
  <!-- Body -->
  <rect x="8" y="52" width="84" height="88" rx="8" fill="#2ecc40" stroke="#1e9e30" stroke-width="2"/>
  <!-- Body highlight -->
  <rect x="16" y="62" width="10" height="64" rx="4" fill="rgba(255,255,255,0.18)"/>
  <!-- Lid bevel -->
  <ellipse cx="50" cy="52" rx="44" ry="7" fill="#27ae36" stroke="#1e9e30" stroke-width="1.5"/>
  <!-- Lid top surface -->
  <rect x="6" y="32" width="88" height="24" rx="9" fill="#2ecc40" stroke="#1e9e30" stroke-width="2"/>
  <!-- Lid top highlight -->
  <rect x="14" y="36" width="72" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- Handle base -->
  <rect x="30" y="14" width="40" height="22" rx="8" fill="#27ae36" stroke="#1e9e30" stroke-width="1.5"/>
  <!-- Handle hole -->
  <rect x="38" y="19" width="24" height="12" rx="5" fill="#1a9c2e"/>
</svg>
